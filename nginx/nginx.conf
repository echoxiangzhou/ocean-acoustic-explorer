server {
    listen 80;
    server_name _;

    # Frontend
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # WebSocket for acoustic computation progress
    location /api/acoustic/progress/ {
        proxy_pass http://backend:8000/api/acoustic/progress/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Satellite basemap proxy (avoid CORS)
    location /MapServer/ {
        proxy_pass http://10.16.202.44:8090/MapServer/;
        proxy_set_header Host 10.16.202.44:8090;
        expires 30d;
    }

    # xpublish WMS tile service
    location /xpublish/ {
        proxy_pass http://wms-server:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        # Cache tiles for 10 minutes, allow stale while revalidating
        expires 10m;
        add_header Cache-Control "public, max-age=600";
    }
}
